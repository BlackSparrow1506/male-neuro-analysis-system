# ==========================================
# Male Neuro Network - Application Config
# ==========================================

server.port=${PORT:8080}

# MongoDB Connection
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/maleneuro}
spring.data.mongodb.database=${MONGODB_DATABASE:maleneuro}

# CORS - Allow frontend
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173,http://localhost:3000}

# Resend Email API
resend.api.key=${RESEND_API_KEY:}

# ElevenLabs TTS
elevenlabs.api.key=${ELEVENLABS_API_KEY:}

# Groq AI
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.history.limit=${GROQ_HISTORY_LIMIT:10}

# JWT
jwt.secret=${JWT_SECRET:change-this-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google Sign-In (ID token verification)
google.client-id=${GOOGLE_CLIENT_ID:}

# ==========================================
# Mail (verification + welcome emails)
# ==========================================
# To enable real email delivery:
#   1. Generate a Gmail app password: https://myaccount.google.com/apppasswords
#   2. Set spring.mail.username = your-gmail@gmail.com
#   3. Set spring.mail.password = the 16-char app password
#   4. Set app.mail.enabled = true
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:5000}

# Sender identity shown to recipients
app.mail.from=${MAIL_FROM:}
app.mail.from-name=${MAIL_FROM_NAME:Male Neural Network}
# Set false during local dev if you don't want to send real emails
app.mail.enabled=${MAIL_ENABLED:false}

# Public URLs used inside email links / redirects
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# Rate Limits (per user, per minute)
# ==========================================
app.ratelimit.chat.per-minute=${RATELIMIT_CHAT_PER_MINUTE:20}
app.ratelimit.tts.per-minute=${RATELIMIT_TTS_PER_MINUTE:30}

# Logging
logging.level.com.maleneuro=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.data.mongodb=${MONGODB_LOG_LEVEL:INFO}
